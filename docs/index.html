<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工具每日速递 · Skill 精选</title>
<style>
:root {
  --bg: #f8f9fc; --card: #fff; --text: #1a1a2e; --muted: #6b7280;
  --border: #e5e7eb; --purple: #6c5ce7; --green: #10ac84; --blue: #3867d6;
  --orange: #f39c12; --pink: #e84393; --teal: #00b894;
  --radius: 14px; --shadow: 0 1px 3px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
a { color:var(--purple); text-decoration:none; }
.header { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); padding:30px 24px 20px; text-align:center; }
.header h1 { color:#fff; font-size:24px; margin-bottom:6px; }
.header p { color:rgba(255,255,255,.65); font-size:13px; }
.tab-bar { display:flex; background:var(--card); border-bottom:1px solid var(--border); overflow-x:auto; position:sticky; top:0; z-index:10; }
.tab-btn { flex-shrink:0; padding:13px 20px; font-size:14px; border:none; background:none; cursor:pointer; color:var(--muted); font-weight:500; transition:all .2s; white-space:nowrap; border-bottom:2px solid transparent; }
.tab-btn.active { color:var(--purple); border-bottom-color:var(--purple); font-weight:700; }
.tab-btn:hover { color:var(--text); background:#f9fafb; }
.container { max-width:860px; margin:0 auto; padding:20px 16px 60px; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* Issue card */
.issue-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); margin-bottom:14px; padding:18px 20px; transition:box-shadow .2s; }
.issue-card:hover { box-shadow:var(--shadow); }
.issue-card .ic-top { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.issue-card .ic-num { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex-shrink:0; }
.n-purple { background:var(--purple); } .n-green { background:var(--green); } .n-blue { background:var(--blue); } .n-orange { background:var(--orange); }
.issue-card .ic-date { font-size:12px; color:var(--muted); }
.issue-card .ic-title { font-size:16px; font-weight:700; margin-bottom:4px; }
.issue-card .ic-sub { font-size:12px; color:var(--muted); margin-bottom:8px; }
.issue-card .ic-tags { display:flex; flex-wrap:wrap; gap:6px; }
.issue-card .ic-tag { font-size:11px; background:#f3f0ff; color:var(--purple); padding:2px 8px; border-radius:10px; }

/* Section title */
.section-title { font-size:18px; font-weight:800; margin:20px 0 12px; color:var(--text); }

/* Category grid */
.cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; margin-bottom:10px; }
.cat-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px; cursor:pointer; transition:all .2s; }
.cat-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.08); border-color:#d4c5f9; }
.cat-card .cc-h { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.cat-card .cc-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.cat-card .cc-name { font-size:15px; font-weight:700; }
.cat-card .cc-desc { font-size:12px; color:var(--muted); margin-bottom:8px; }
.cat-card .cc-skills { display:flex; gap:4px; flex-wrap:wrap; }
.cat-card .cc-skill { font-size:11px; background:#f0fdf4; color:var(--green); padding:1px 6px; border-radius:4px; }

/* Skill expand section */
.skill-expand { display:none; margin-top:14px; }
.skill-expand.show { display:block; }
.skill-detail { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px; margin-bottom:12px; }
.skill-detail .sd-h { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.skill-detail .sd-name { font-size:15px; font-weight:700; }
.skill-detail .sd-stars { font-size:12px; color:var(--orange); }
.skill-detail .sd-result { margin-top:8px; padding:8px 12px; background:#ecfdf5; border-radius:8px; font-size:12px; color:#065f46; }
.skill-detail .sd-install { margin-top:8px; padding:8px 12px; background:#1a1a2e; border-radius:8px; font-size:11px; color:#a0ec7d; font-family:monospace; word-break:break-all; }

/* Scenario (实战) cards */
.sc-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px 18px; margin-bottom:10px; transition:box-shadow .2s; cursor:pointer; }
.sc-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.08); }
.sc-card .sc-top { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.sc-card .sc-icon { font-size:22px; }
.sc-card .sc-title { font-size:15px; font-weight:700; }
.sc-card .sc-flow { display:flex; flex-wrap:wrap; gap:4px; margin:8px 0; }
.sc-card .sc-skill { font-size:11px; background:#fdfbff; color:var(--purple); padding:2px 7px; border-radius:4px; border:1px solid #e8e0ff; }
.sc-card .sc-outcome { font-size:12px; color:#065f46; background:#ecfdf5; padding:8px 10px; border-radius:6px; margin-top:6px; }
.sc-card .sc-note { font-size:12px; color:var(--muted); }

/* Combo steps (实战内联) */
.combo-block { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); margin-bottom:14px; overflow:hidden; }
.combo-block .cb-header { padding:16px 18px; border-bottom:1px solid var(--border); }
.combo-block .cb-scene { font-size:12px; color:var(--pink); background:#fef1f7; display:inline-block; padding:2px 8px; border-radius:4px; margin-bottom:4px; }
.combo-block .cb-title { font-size:16px; font-weight:700; }
.combo-block .cb-outcome { margin:12px 18px; padding:10px 14px; background:linear-gradient(135deg,#ecfdf5,#f0fdf4); border-radius:8px; font-size:12px; color:#065f46; }
.combo-step { padding:14px 18px; border-bottom:1px solid var(--border); }
.combo-step:last-child { border-bottom:none; }
.combo-step .cs-label { font-size:14px; font-weight:700; margin-bottom:6px; }
.combo-step .cs-prompt { padding:8px 12px; background:#fdfbff; border-left:3px solid #d4c5f9; border-radius:0 8px 8px 0; font-size:12px; color:#555; line-height:1.6; margin-bottom:6px; font-family:monospace; font-size:11px; }
.combo-step .cs-get { font-size:12px; color:#065f46; }

/* Showdown table */
.showdown-block { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); margin-bottom:16px; overflow:hidden; }
.showdown-block .sd-header { padding:16px 18px; border-bottom:1px solid var(--border); }
.showdown-block .sd-title { font-size:16px; font-weight:700; }
.showdown-block .sd-desc { font-size:12px; color:var(--muted); margin-top:4px; }
.showdown-table { width:100%; border-collapse:collapse; font-size:13px; }
.showdown-table th { background:#f9fafb; padding:10px 12px; text-align:left; font-size:12px; color:var(--muted); font-weight:600; border-bottom:1px solid var(--border); }
.showdown-table th:first-child { width:100px; }
.showdown-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
.showdown-table tr:last-child td { border-bottom:none; }

/* Tips */
.tip-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
.tip-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px; }
.tip-card .tp-skill { font-size:11px; color:var(--purple); font-weight:600; margin-bottom:4px; }
.tip-card .tp-before { font-size:12px; color:#dc2626; margin-bottom:4px; padding:6px 8px; background:#fef2f2; border-radius:6px; }
.tip-card .tp-after { font-size:12px; color:#065f46; margin-bottom:6px; padding:6px 8px; background:#ecfdf5; border-radius:6px; }
.tip-card .tp-do { font-size:11px; color:var(--muted); padding:6px 8px; background:#f9fafb; border-radius:6px; }

/* Trends */
.trend-list { display:flex; flex-direction:column; gap:8px; }
.trend-item { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:14px 16px; display:flex; gap:12px; align-items:flex-start; }
.trend-item .tr-date { font-size:11px; color:var(--purple); font-weight:700; background:#f3f0ff; padding:3px 8px; border-radius:4px; white-space:nowrap; }
.trend-item .tr-body { flex:1; }
.trend-item .tr-title { font-size:14px; font-weight:700; margin-bottom:3px; }
.trend-item .tr-text { font-size:12px; color:var(--muted); line-height:1.5; }
.trend-item .tr-src { font-size:11px; color:#9ca3af; margin-top:3px; }

/* Collections */
.col-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; margin-top:16px; }
.col-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px; }
.col-card .cl-icon { font-size:28px; margin-bottom:8px; }
.col-card .cl-title { font-size:15px; font-weight:700; margin-bottom:4px; }
.col-card .cl-desc { font-size:12px; color:var(--muted); margin-bottom:8px; }
.col-card .cl-topics { display:flex; flex-wrap:wrap; gap:4px; }
.col-card .cl-topic { font-size:11px; background:#fdfbff; color:var(--purple); padding:2px 7px; border-radius:4px; }

/* Selector bar (for 技能库 sub-view) */
.selector-bar { display:flex; gap:8px; margin-bottom:16px; }
.sel-btn { padding:7px 16px; border-radius:20px; border:1px solid var(--border); background:var(--card); font-size:13px; cursor:pointer; transition:all .2s; }
.sel-btn.active { background:var(--purple); color:#fff; border-color:var(--purple); }

/* Responsive */
@media (max-width:600px) {
  .cat-grid,.tip-grid,.col-grid { grid-template-columns:1fr; }
  .showdown-table { font-size:11px; }
  .showdown-table th,.showdown-table td { padding:8px 6px; }
}
</style>
</head>

<header class="header">
  <h1>AI 工具每日速递</h1>
  <p>13 个精选 Skills · 6 大分类 · 从发现到运用，一站式 Skill 导航</p>

  <button class="tab-btn" data-tab="news">资讯</button>
</nav>

<div class="container">

<!-- ═══════════ TAB 2: 实战 ═══════════ -->
<section class="tab-content" id="tab-practical">

  <p style="font-size:12px;color:var(--muted);margin-bottom:14px;">根据你的真实需求，快速定位需要哪些 Skill，点击展开看具体步骤和可复制 Prompt</p>
  <div id="sceneArea"></div>
  <div class="section-title" style="margin-top:28px;">组合技教程</div>
  <p style="font-size:12px;color:var(--muted);margin-bottom:14px;">从真实痛点出发，每一步都给可以直接复制发给 Codex 的 Prompt</p>
  <div id="comboArea"></div>
</section>

<!-- ═══════════ TAB 3: 技能库 ═══════════ -->
<section class="tab-content" id="tab-library">
  <div class="selector-bar">
    <button class="sel-btn active" data-sub="cat">分类浏览</button>
    <button class="sel-btn" data-sub="vs">Skill 擂台</button>

  <div id="libSubCat" class="lib-sub show">

  <div id="libSubVs" class="lib-sub" style="display:none;">
    <div id="showdownArea"></div>

</section>

<!-- ═══════════ TAB 4: 技巧 ═══════════ -->
<section class="tab-content" id="tab-tips">
  <div class="section-title">💡 用法技巧</div>
  <p style="font-size:12px;color:var(--muted);margin-bottom:14px;">每个 Skill 一个具体用法，Before/After 对比 + 怎么做</p>
  <div class="tip-grid" id="tipGrid"></div>
</section>

<!-- ═══════════ TAB 5: 资讯 ═══════════ -->
<section class="tab-content" id="tab-news">
  <div class="section-title">🌊 AI 生态速览</div>
  <div class="trend-list" id="trendList"></div>
  <div class="section-title" style="margin-top:28px;">📦 专题合集</div>
  <div class="col-grid" id="colGrid"></div>
</section>

// ─── Shortcuts ───
const S = DATA.skills;
const skillName = id => (S[id]||{name:id}).name;
const skillTags = id => (S[id]||{tags:[]}).tags||[];

// ─── Tab switch ───
document.querySelectorAll('.tab-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
  };
});

// ─── Sub-selector (技能库) ───
document.querySelectorAll('.sel-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.sel-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('libSubCat').style.display = b.dataset.sub === 'cat' ? 'block' : 'none';
    document.getElementById('libSubVs').style.display = b.dataset.sub === 'vs' ? 'block' : 'none';
  };
});

// ─── Render: Issues ───
function renderIssues() {
  document.getElementById('issueArea').innerHTML = DATA.issues.map(iss => {
    const tagsHtml = (iss.tags||[]).map(t => `<span class="ic-tag">${t}</span>`).join('');
    return `<a class="issue-card" href="issues/${iss.file}" target="_blank">
      <div class="ic-top">
        <div class="ic-num ${iss.numColor}">#${iss.id}</div>
        <div class="ic-date">${iss.date} ${iss.weekday}</div>
      </div>
      <div class="ic-title">${iss.title}</div>
      <div class="ic-sub">${iss.subtitle}</div>
      <div class="ic-tags">${tagsHtml}</div>
    </a>`;
  }).join('');
}

// ─── Render: Categories ───
let activeCat = null;
function renderCategories() {
  document.getElementById('catGrid').innerHTML = DATA.categories.map(cat => {
    const sBadges = cat.skills.map(sid => `<span class="cc-skill">${skillName(sid)}</span>`).join('');
    return `<div class="cat-card" data-cat="${cat.id}" style="border-left:3px solid ${cat.color};">
      <div class="cc-h"><span class="cc-icon" style="background:${cat.color}15;color:${cat.color}">${cat.icon}</span><span class="cc-name">${cat.name}</span></div>
      <div class="cc-desc">${cat.desc}</div>
      <div class="cc-skills">${sBadges}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('.cat-card').forEach(card => {
    card.onclick = () => {
      const catId = card.dataset.cat;
      if (activeCat === catId) { activeCat = null; document.getElementById('catDetail').innerHTML = ''; return; }
      activeCat = catId;
      const cat = DATA.categories.find(c => c.id === catId);
      const details = (cat.skills||[]).map(sid => {
        const s = S[sid];
        if (!s) return '';
        return `<div class="skill-detail">
          <div class="sd-h"><span class="sd-name">${s.name}</span><span class="sd-stars">⭐ ${s.stars}</span></div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">${s.desc}</div>
          <div class="sd-result">📦 效果：${s.result||''}</div>
          <div class="sd-install">${s.install||''}</div>
        </div>`;
      }).join('');
      document.getElementById('catDetail').innerHTML = `<div class="skill-expand show">${details}</div>`;
      document.getElementById('catDetail').scrollIntoView({behavior:'smooth'});
    };
  });
}

// ─── Render: Showdowns ───
function renderShowdowns() {
  document.getElementById('showdownArea').innerHTML = DATA.showdowns.map(sd => {
    const headers = sd.skills.map(sid => `<th>${skillName(sid)}</th>`).join('');
    const rows = sd.dimensions.map(dim => {
      const cells = dim.values.map(v => `<td>${v}</td>`).join('');
      return `<tr><td>${dim.label}</td>${cells}</tr>`;
    }).join('');
    return `<div class="showdown-block">
      <div class="sd-header"><div class="sd-title">⚔️ ${sd.title}</div><div class="sd-desc">${sd.desc}</div></div>
      <table class="showdown-table"><thead><tr><th>维度</th>${headers}</tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}

// ─── Render: Scenarios ───
function renderScenarios() {
  document.getElementById('sceneArea').innerHTML = DATA.scenarios.map(sc => {
    const flowBadges = sc.flow.map(sid => `<span class="sc-skill">${skillName(sid)}</span>`).join('<span style="font-size:11px;color:#ccc;">→</span>');
    return `<div class="sc-card" data-scene="${sc.id}">
      <div class="sc-top"><span class="sc-icon">${sc.icon}</span><span class="sc-title">${sc.title}</span></div>
      <div class="sc-note">${sc.note}</div>
      <div class="sc-flow">${flowBadges}</div>
      <div class="sc-outcome">🏆 ${sc.outcome}</div>
    </div>`;
  }).join('');
}

// ─── Render: Combos ───
function renderCombos() {
  document.getElementById('comboArea').innerHTML = DATA.combos.map(co => {
    const stepsHtml = co.steps.map(s => `
      <div class="combo-step">
        <div class="cs-label">${s.label} <span style="font-size:11px;color:var(--purple);font-weight:400;">[${skillName(s.skill)}]</span></div>
        <div class="cs-prompt">${s.prompt}</div>
        <div class="cs-get">✅ ${s.get}</div>
      </div>`).join('');
    return `<div class="combo-block">
      <div class="cb-header">
        <span class="cb-scene">🆘 ${co.scene}</span>
        <div class="cb-title">${co.icon} ${co.title}</div>
      </div>
      <div class="cb-outcome"><strong>🏆 最终成果：</strong>${co.outcome}</div>
      ${stepsHtml}
    </div>`;
  }).join('');
}

// ─── Render: Tips ───
function renderTips() {
  document.getElementById('tipGrid').innerHTML = DATA.tips.map(t => {
    const sk = S[t.skill]||{};
    return `<div class="tip-card">
      <div class="tp-skill">${sk.name||t.skill} · ${t.level}</div>
      <div class="tp-before">❌ 之前：${t.before}</div>
      <div class="tp-after">✅ 之后：${t.after}</div>
      <div class="tp-do">🔧 怎么做：${t.do}</div>
    </div>`;
  }).join('');
}

// ─── Render: Trends ───
function renderTrends() {
  document.getElementById('trendList').innerHTML = DATA.trends.map(t => `
    <div class="trend-item">
      <span class="tr-date">${t.date}</span>
      <div class="tr-body">
        <div class="tr-title">${t.title}</div>
        <div class="tr-text">${t.body}</div>
        <div class="tr-src">${t.source}</div>
      </div>
    </div>`).join('');
}

// ─── Render: Collections ───
function renderCollections() {
  document.getElementById('colGrid').innerHTML = DATA.collections.map(c => {
    const topics = c.topics.map(tp => `<span class="cl-topic">${tp}</span>`).join('');
    return `<div class="col-card">
      <div class="cl-icon">${c.icon}</div>
      <div class="cl-title">${c.title}</div>
      <div class="cl-desc">${c.desc}</div>
      <div class="cl-topics">${topics}</div>
    </div>`;
  }).join('');
}

// ─── Init ───
renderIssues();
renderCategories();
renderShowdowns();
renderScenarios();
renderCombos();
renderTips();
renderTrends();
renderCollections();
</script>
</body>
